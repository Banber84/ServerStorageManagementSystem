<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} - Server Storage Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Storage Admin</a>
    <div class="navbar-nav">
      <a class="nav-link" href="/">Dashboard</a>
      <a class="nav-link active" href="/users">Users</a>
      <a class="nav-link" href="/storage">Storage</a>
      <a class="nav-link" href="/servers">Servers</a>
      <a class="nav-link" href="/logs">Logs</a>
    </div>
  </div>
</nav>

<main class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3">用户管理</h1>
  </div>

  <form class="row g-2 border rounded p-3 mb-4" method="post" action="/users">
    <div class="col-md-2">
      <label class="form-label">用户名</label>
      <input class="form-control" name="username" required>
    </div>
    <div class="col-md-2">
      <label class="form-label">姓名</label>
      <input class="form-control" name="full_name">
    </div>
    <div class="col-md-3">
      <label class="form-label">邮箱</label>
      <input class="form-control" name="email" type="email">
    </div>
    <div class="col-md-3">
      <label class="form-label">配额 Bytes</label>
      <input class="form-control" name="quota_bytes" type="number" min="1" value="1073741824" required>
    </div>
    <div class="col-md-2 d-flex align-items-end">
      <button class="btn btn-primary w-100" type="submit">创建用户</button>
    </div>
  </form>

  <div class="table-responsive">
    <table class="table align-middle">
      <thead><tr><th>ID</th><th>用户名</th><th>姓名</th><th>邮箱</th><th>配额 Bytes</th><th>更新时间</th><th>操作</th></tr></thead>
      <tbody>
      {{ range .Users }}
        <tr>
          <td>{{ .ID }}</td>
          <td>{{ .Username }}</td>
          <td>{{ .FullName }}</td>
          <td>{{ .Email }}</td>
          <td>
            <form class="d-flex gap-2" method="post" action="/users/{{ .ID }}/quota">
              <input class="form-control form-control-sm" name="quota_bytes" type="number" min="1" value="{{ .QuotaBytes }}" required>
              <button class="btn btn-sm btn-outline-primary" type="submit">保存</button>
            </form>
          </td>
          <td>{{ .UpdatedAt.Format "2006-01-02 15:04:05" }}</td>
          <td>
            <form method="post" action="/users/{{ .ID }}/delete">
              <button class="btn btn-sm btn-outline-danger" type="submit">删除</button>
            </form>
          </td>
        </tr>
      {{ else }}
        <tr><td colspan="7" class="text-secondary">暂无用户</td></tr>
      {{ end }}
      </tbody>
    </table>
  </div>
</main>
</body>
</html>
