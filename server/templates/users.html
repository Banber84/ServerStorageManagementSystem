<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} - 存储管理系统</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <a class="brand" href="/">存储管理系统<small>Server Storage Management</small></a>
    <nav class="nav" aria-label="主导航">
      <a href="/">概览</a>
      <a class="active" href="/users">用户管理</a>
      <a href="/storage">存储统计</a>
      <a href="/servers">节点监控</a>
      <a href="/logs">系统日志</a>
    </nav>
  </aside>

  <main class="content">
    <header class="page-header">
      <div>
        <h1 class="page-title">用户管理</h1>
        <p class="page-subtitle">管理后台用户记录和配额同步值。</p>
      </div>
    </header>

    <form class="form-panel" method="post" action="/users">
      <div class="field span-2">
        <label>用户名</label>
        <input name="username" required>
      </div>
      <div class="field span-2">
        <label>姓名</label>
        <input name="full_name">
      </div>
      <div class="field span-3">
        <label>邮箱</label>
        <input name="email" type="email">
      </div>
      <div class="field span-2">
        <label>配额</label>
        <input name="quota_value" type="number" min="1" step="0.01" value="1024" required>
      </div>
      <div class="field span-1">
        <label>单位</label>
        <select name="quota_unit">
          <option value="MB" selected>MB</option>
          <option value="GB">GB</option>
        </select>
      </div>
      <div class="field span-2 action">
        <button class="btn primary" type="submit">创建用户</button>
      </div>
    </form>

    <section class="panel">
      <div class="panel-header">
        <h2 class="panel-title">用户列表</h2>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
          <tr><th>ID</th><th>用户名</th><th>姓名</th><th>邮箱</th><th>配额</th><th>更新时间</th><th>操作</th></tr>
          </thead>
          <tbody>
          {{ range .Users }}
            <tr>
              <td>{{ .ID }}</td>
              <td>{{ .Username }}</td>
              <td>{{ .FullName }}</td>
              <td>{{ .Email }}</td>
              <td>
                <form class="inline-form" method="post" action="/users/{{ .ID }}/quota">
                  <input name="quota_value" type="number" min="0.01" step="0.01" value="{{ quotaValue .QuotaBytes }}" required>
                  <select name="quota_unit">
                    <option value="MB" {{ if eq (quotaUnit .QuotaBytes) "MB" }}selected{{ end }}>MB</option>
                    <option value="GB" {{ if eq (quotaUnit .QuotaBytes) "GB" }}selected{{ end }}>GB</option>
                  </select>
                  <button class="btn ghost" type="submit">保存</button>
                </form>
              </td>
              <td><time data-time="{{ formatTimeISO .UpdatedAt }}">{{ formatTime .UpdatedAt }}</time></td>
              <td>
                <form method="post" action="/users/{{ .ID }}/delete" data-confirm="确认删除该用户记录？">
                  <button class="btn danger" type="submit">删除</button>
                </form>
              </td>
            </tr>
          {{ else }}
            <tr><td colspan="7" class="empty">暂无用户</td></tr>
          {{ end }}
          </tbody>
        </table>
      </div>
    </section>
  </main>
</div>
<script src="/static/js/app.js?v=20260627-log-menu"></script>
</body>
</html>
