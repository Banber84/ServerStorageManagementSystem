<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} - Server Storage Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Storage Admin</a>
    <div class="navbar-nav">
      <a class="nav-link" href="/">Dashboard</a>
      <a class="nav-link" href="/users">Users</a>
      <a class="nav-link" href="/storage">Storage</a>
      <a class="nav-link" href="/servers">Servers</a>
      <a class="nav-link active" href="/logs">Logs</a>
    </div>
  </div>
</nav>

<main class="container py-4">
  <h1 class="h3 mb-3">日志查看</h1>

  <form class="row g-2 border rounded p-3 mb-4" method="post" action="/logs">
    <div class="col-md-2">
      <label class="form-label">类型</label>
      <select class="form-select" name="type">
        <option value="login">login</option>
        <option value="mount">mount</option>
        <option value="system">system</option>
      </select>
    </div>
    <div class="col-md-2">
      <label class="form-label">用户</label>
      <input class="form-control" name="username">
    </div>
    <div class="col-md-2">
      <label class="form-label">节点</label>
      <input class="form-control" name="server_name">
    </div>
    <div class="col-md-4">
      <label class="form-label">内容</label>
      <input class="form-control" name="message" required>
    </div>
    <div class="col-md-2 d-flex align-items-end">
      <button class="btn btn-primary w-100" type="submit">写入日志</button>
    </div>
  </form>

  <div class="table-responsive">
    <table class="table align-middle">
      <thead><tr><th>时间</th><th>类型</th><th>用户</th><th>节点</th><th>内容</th></tr></thead>
      <tbody>
      {{ range .Logs }}
        <tr>
          <td>{{ .CreatedAt.Format "2006-01-02 15:04:05" }}</td>
          <td><span class="badge text-bg-light">{{ .Type }}</span></td>
          <td>{{ .Username }}</td>
          <td>{{ .ServerName }}</td>
          <td>{{ .Message }}</td>
        </tr>
      {{ else }}
        <tr><td colspan="5" class="text-secondary">暂无日志</td></tr>
      {{ end }}
      </tbody>
    </table>
  </div>
</main>
</body>
</html>
