<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} - 存储管理系统</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <a class="brand" href="/">存储管理系统<small>Server Storage Management</small></a>
    <nav class="nav" aria-label="主导航">
      <a href="/">概览</a>
      <a href="/users">用户管理</a>
      <a href="/storage">存储统计</a>
      <a href="/servers">节点监控</a>
      <a class="active" href="/logs">系统日志</a>
    </nav>
  </aside>

  <main class="content">
    <header class="page-header">
      <div>
        <h1 class="page-title">系统日志</h1>
        <p class="page-subtitle">按类型和级别查看登录、挂载、同步和系统事件。</p>
      </div>
    </header>

    <form class="form-panel" method="post" action="/logs">
      <div class="field span-2">
        <label>类型</label>
        <select name="type">
          <option value="login">login</option>
          <option value="mount">mount</option>
          <option value="sync">sync</option>
          <option value="storage">storage</option>
          <option value="quota">quota</option>
          <option value="user">user</option>
          <option value="agent">agent</option>
          <option value="system">system</option>
          <option value="warning">warning</option>
          <option value="error">error</option>
        </select>
      </div>
      <div class="field span-2">
        <label>用户</label>
        <input name="username">
      </div>
      <div class="field span-2">
        <label>节点</label>
        <input name="server_name">
      </div>
      <div class="field span-4">
        <label>内容</label>
        <input name="message" required>
      </div>
      <div class="field span-2 action">
        <button class="btn primary" type="submit">写入日志</button>
      </div>
    </form>

    <section class="panel">
      <div class="panel-header">
        <h2 class="panel-title">日志列表</h2>
      </div>
      <form class="filter-panel" method="get" action="/logs" data-log-filters>
        <div class="field">
          <label>级别</label>
          <select name="level" data-filter-level>
            <option value="">ALL</option>
            <option value="INFO" {{ if eq .Filter.Level "INFO" }}selected{{ end }}>INFO</option>
            <option value="WARN" {{ if eq .Filter.Level "WARN" }}selected{{ end }}>WARN</option>
            <option value="ERROR" {{ if eq .Filter.Level "ERROR" }}selected{{ end }}>ERROR</option>
          </select>
        </div>
        <div class="field">
          <label>类型</label>
          <select name="type" data-filter-type>
            <option value="">ALL</option>
            <option value="login" {{ if eq .Filter.Type "login" }}selected{{ end }}>login</option>
            <option value="mount" {{ if eq .Filter.Type "mount" }}selected{{ end }}>mount</option>
            <option value="sync" {{ if eq .Filter.Type "sync" }}selected{{ end }}>sync</option>
            <option value="storage" {{ if eq .Filter.Type "storage" }}selected{{ end }}>storage</option>
            <option value="quota" {{ if eq .Filter.Type "quota" }}selected{{ end }}>quota</option>
            <option value="user" {{ if eq .Filter.Type "user" }}selected{{ end }}>user</option>
            <option value="agent" {{ if eq .Filter.Type "agent" }}selected{{ end }}>agent</option>
            <option value="system" {{ if eq .Filter.Type "system" }}selected{{ end }}>system</option>
            <option value="warning" {{ if eq .Filter.Type "warning" }}selected{{ end }}>warning</option>
            <option value="error" {{ if eq .Filter.Type "error" }}selected{{ end }}>error</option>
          </select>
        </div>
        <div class="field">
          <label>关键字</label>
          <input name="keyword" value="{{ .Filter.Keyword }}" data-filter-keyword placeholder="用户、节点、路径或日志内容">
        </div>
        <label class="checkbox-field">
          <input name="key_only" value="1" data-filter-key-only type="checkbox" {{ if .Filter.KeyOnly }}checked{{ end }}>
          只看关键日志
        </label>
        <div class="field action">
          <button class="btn primary" type="submit">筛选</button>
        </div>
        <div class="field action">
          <a class="btn ghost" href="/logs">重置</a>
        </div>
      </form>
      <div class="table-wrap">
        <table>
          <thead>
          <tr><th>时间</th><th>级别</th><th>类型</th><th>用户</th><th>节点</th><th>内容</th></tr>
          </thead>
          <tbody>
          {{ range .Logs }}
            <tr data-log-row data-log-type="{{ .Type }}" data-log-message="{{ .Message }}">
              <td><time data-time="{{ formatTimeISO .CreatedAt }}">{{ formatTime .CreatedAt }}</time></td>
              <td><span data-log-level>INFO</span></td>
              <td><span class="badge info" data-log-type-label data-log-type="{{ .Type }}">{{ .Type }}</span></td>
              <td>{{ .Username }}</td>
              <td>{{ .ServerName }}</td>
              <td class="message-cell">{{ .Message }}</td>
            </tr>
          {{ else }}
            <tr><td colspan="6" class="empty">暂无日志</td></tr>
          {{ end }}
          </tbody>
        </table>
      </div>
    </section>
  </main>
</div>
<script src="/static/js/app.js?v=20260627-log-menu"></script>
</body>
</html>
