<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} - 存储管理系统</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <a class="brand" href="/">存储管理系统<small>Server Storage Management</small></a>
    <nav class="nav" aria-label="主导航">
      <a href="/">概览</a>
      <a href="/users">用户管理</a>
      <a href="/storage">存储统计</a>
      <a href="/servers">节点监控</a>
      <a class="active" href="/logs">系统日志</a>
    </nav>
  </aside>

  <main class="content">
    <header class="page-header">
      <div>
        <h1 class="page-title">系统日志</h1>
        <p class="page-subtitle">按类型和级别查看登录、挂载、同步和系统事件。</p>
      </div>
    </header>

    <form class="form-panel" method="post" action="/logs">
      <div class="field span-2">
        <label>类型</label>
        <select name="type">
          <option value="login">登录</option>
          <option value="mount">挂载</option>
          <option value="sync">同步</option>
          <option value="agent">Agent</option>
          <option value="system">系统</option>
          <option value="warning">警告</option>
          <option value="error">错误</option>
        </select>
      </div>
      <div class="field span-2">
        <label>用户</label>
        <input name="username">
      </div>
      <div class="field span-2">
        <label>节点</label>
        <input name="server_name">
      </div>
      <div class="field span-4">
        <label>内容</label>
        <input name="message" required>
      </div>
      <div class="field span-2 action">
        <button class="btn primary" type="submit">写入日志</button>
      </div>
    </form>

    <section class="panel">
      <div class="panel-header">
        <h2 class="panel-title">日志列表</h2>
      </div>
      <div class="filter-panel" data-log-filters>
        <div class="field">
          <label>级别</label>
          <select data-filter-level>
            <option value="">全部</option>
            <option value="INFO">INFO</option>
            <option value="WARN">WARN</option>
            <option value="ERROR">ERROR</option>
          </select>
        </div>
        <div class="field">
          <label>类型</label>
          <select data-filter-type>
            <option value="">全部</option>
            <option value="login">登录</option>
            <option value="mount">挂载</option>
            <option value="sync">同步</option>
            <option value="storage">存储</option>
            <option value="quota">配额</option>
            <option value="agent">Agent</option>
            <option value="system">系统</option>
            <option value="warning">警告</option>
            <option value="error">错误</option>
          </select>
        </div>
        <div class="field">
          <label>关键字</label>
          <input data-filter-keyword placeholder="用户、节点、路径或日志内容">
        </div>
        <label class="checkbox-field">
          <input data-filter-key-only type="checkbox">
          只看关键日志
        </label>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
          <tr><th>时间</th><th>级别</th><th>类型</th><th>用户</th><th>节点</th><th>内容</th></tr>
          </thead>
          <tbody>
          {{ range .Logs }}
            <tr data-log-row data-log-type="{{ .Type }}" data-log-message="{{ .Message }}">
              <td><time data-time="{{ .CreatedAt.Format "2006-01-02T15:04:05Z07:00" }}">{{ .CreatedAt.Format "2006-01-02 15:04:05" }}</time></td>
              <td><span data-log-level>INFO</span></td>
              <td><span class="badge info" data-log-type-label data-log-type="{{ .Type }}">{{ .Type }}</span></td>
              <td>{{ .Username }}</td>
              <td>{{ .ServerName }}</td>
              <td class="message-cell">{{ .Message }}</td>
            </tr>
          {{ else }}
            <tr><td colspan="6" class="empty">暂无日志</td></tr>
          {{ end }}
          </tbody>
        </table>
      </div>
    </section>
  </main>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
