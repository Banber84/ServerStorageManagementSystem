# 登录节点同步清单
#
# 格式：
#   节点名 主机地址 SSH用户 项目目录
#
# 示例：
#   NodeA 192.168.1.188 nodea1 /home/nodea1/SSMS
#   NodeB 192.168.1.189 nodeb1 /home/nodeb1/SSMS
#
# 要求：
# 1. Storage Server 可以通过 SSH 登录到每个节点。
# 2. SSH 用户可以免密执行 sudo scripts/create_node_user.sh。
# 3. 每个节点的项目目录中包含 scripts/create_node_user.sh。

NodeA 192.168.1.122 nodea1 /home/nodea1/SSMS
NodeB 192.168.1.125 nodeb1 /home/nodeb1/SSMS
